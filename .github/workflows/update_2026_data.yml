name: Update 2026 Live Season Data

# Daily refresh + evening catch-up during the regular season.
# Also runs when triggered manually from the Actions tab.
on:
  schedule:
    - cron: "0 13 * * *"   # 9:00 AM ET
    - cron: "0 3 * * *"    # 11:00 PM ET (previous day)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch 2026 season data
        run: python scripts/fetch_2026_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/processed/comprehensive_stats_2026.csv \
                  data/processed/last_updated_2026.txt
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-update 2026 hitter data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
