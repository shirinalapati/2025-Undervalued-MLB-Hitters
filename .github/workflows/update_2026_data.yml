name: Update 2026 Live Season Data

# Runs daily at 9:00 AM ET (13:00 UTC) — after most overnight Statcast uploads
on:
  schedule:
    - cron: "0 13 * * *"
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ─────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 5. Run data pipeline ──────────────────────────────────────────
      - name: Fetch 2026 season data
        run: python scripts/fetch_2026_data.py

      # ── 6. Commit updated CSV + timestamp ─────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/comprehensive_stats_2026.csv \
                  data/processed/last_updated_2026.txt
          git diff --cached --quiet || \
            git commit -m "chore: auto-update 2026 hitter data [$(date -u '+%Y-%m-%d')]"

      # ── 7. Push ───────────────────────────────────────────────────────
      - name: Push changes
        uses: ad-hoc/git-push-action@v0
        # Simple push; falls back gracefully if nothing changed
        continue-on-error: true
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # ── Fallback push (if action above is unavailable) ────────────────
      - name: Push (fallback)
        if: always()
        run: git push origin HEAD || true
